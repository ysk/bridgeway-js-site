<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>レガシー×Svelteを state で橋渡し — bridgey</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 560px; margin: 20px auto; padding: 0 16px; line-height: 1.7; color: #222; }
    .zone { color: #888; font-size: 12px; font-weight: 700; margin: 14px 0 2px; }
    input, .btn { font: inherit; padding: 5px 10px; }
    .btn { border: 1px solid #ccc; border-radius: 6px; background: #fafafa; cursor: pointer; }
    #picked { color: #2b7; font-weight: bold; }
  </style>
</head>
<body>
  <!-- レガシー領域: 入力は jQuery の手癖のまま -->
  <p class="zone">レガシー領域（jQuery）</p>
  <p>
    <input id="q" placeholder="検索語を入力（例: an）" />
    <button id="clear" class="btn">クリア</button>
  </p>

  <!-- Svelteの領域: 描画は本物の Svelte に丸投げ -->
  <div id="panel"></div>

  <!-- レガシー領域: Svelteの領域から来たイベントを jQuery で反映 -->
  <p class="zone">レガシー領域（jQuery）</p>
  <p id="picked">(まだ選択なし)</p>

  <script src="./app.js"></script>
</body>
</html>
