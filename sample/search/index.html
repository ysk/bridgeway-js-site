<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ライブ検索フィルタ — bridgey</title>
  <!-- eval不使用なので strict CSP でも動く -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" />
  <style>
    body{font-family:system-ui,"Hiragino Kaku Gothic ProN",Meiryo,sans-serif;max-width:560px;margin:24px auto;padding:0 16px;color:#222;line-height:1.7}
    .search{position:relative}
    .search input{width:100%;font-size:16px;padding:11px 14px 11px 38px;border:1px solid #ccd;border-radius:10px;font-family:inherit}
    .search input:focus{outline:none;border-color:#6d5efc}
    .search .ico{position:absolute;left:12px;top:12px;color:#aab;pointer-events:none}
    .search .ico svg{display:block;width:18px;height:18px}
    .search .clear{position:absolute;right:10px;top:8px;border:0;background:#eef;color:#66a;border-radius:6px;padding:4px 9px;cursor:pointer;font-size:13px;display:none}
    .chips{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
    .chip{border:1px solid #ccd;border-radius:999px;padding:4px 13px;cursor:pointer;font-size:13px;background:#fff;color:#556}
    .chip.active{border-color:#6d5efc;background:#f2f0ff;color:#6d5efc;font-weight:bold}
    .meta{font-size:13px;color:#889;margin:10px 0}
    .meta b{color:#6d5efc}
    ul{list-style:none;padding:0;margin:0}
    li{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid #eee;border-radius:9px;margin:7px 0;background:#fbfbfe}
    li .cat{font-size:11px;font-weight:700;color:#fff;background:#9aa;border-radius:5px;padding:2px 7px}
    li .cat.fruit{background:#e0803a}li .cat.veg{background:#22b07a}li .cat.fish{background:#4a8bd8}li .cat.meat{background:#d05a6e}
    li .price{margin-left:auto;font-weight:bold;color:#445}
    mark{background:#fff2a8;color:#222;border-radius:3px;padding:0 1px}
    .empty{text-align:center;color:#aab;padding:30px 0}
  </style>
</head>
<body>
  <p style="color:#888;font-size:13px">入力するたびに絞り込み・ヒット箇所をハイライト。分類チップとの<b>AND条件</b>も <code>computed</code> で宣言的に。</p>

  <div class="search">
    <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg></span>
    <input id="q" type="text" placeholder="食材を検索（例: たまねぎ / さけ）" autocomplete="off" />
    <button id="clear" class="clear">クリア</button>
  </div>

  <div class="chips" id="chips">
    <span class="chip active" data-cat="all">すべて</span>
    <span class="chip" data-cat="fruit">果物</span>
    <span class="chip" data-cat="veg">野菜</span>
    <span class="chip" data-cat="fish">魚</span>
    <span class="chip" data-cat="meat">肉</span>
  </div>

  <div class="meta"><b id="hit">0</b> 件ヒット<span id="qlabel"></span></div>

  <ul id="list"></ul>

  <script src="./app.js"></script>
</body>
</html>
