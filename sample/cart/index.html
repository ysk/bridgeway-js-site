<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ショッピングカート — bridgey</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" />
  <style>
    body{font-family:system-ui,"Hiragino Kaku Gothic ProN",Meiryo,sans-serif;max-width:560px;margin:24px auto;padding:0 16px;color:#222;line-height:1.7}
    ul{list-style:none;padding:0;margin:0}
    .item{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid #eee;border-radius:10px;margin:8px 0;background:#fbfbfe}
    .item .thumb{width:44px;height:44px;border-radius:9px;display:grid;place-items:center;font-size:18px;font-weight:800;color:#6d5efc;background:#f2f0ff}
    .item .name{font-weight:600}
    .item .unit{font-size:12px;color:#889}
    .item .mid{flex:1}
    .stepper{display:inline-flex;align-items:center;border:1px solid #ccd;border-radius:8px;overflow:hidden}
    .stepper button{width:30px;height:30px;border:0;background:#fff;font-size:16px;cursor:pointer;color:#6d5efc}
    .stepper button:hover{background:#f2f0ff}
    .stepper .qty{width:34px;text-align:center;font-weight:bold}
    .item .sub{min-width:72px;text-align:right;font-weight:bold;color:#445}
    .item .del{border:0;background:none;color:#c99;cursor:pointer;font-size:16px}
    .item .del:hover{color:#e0483a}
    .coupon{display:flex;gap:8px;margin:16px 0 6px}
    .coupon input{flex:1;font-size:15px;padding:8px 10px;border:1px solid #ccd;border-radius:8px}
    .coupon button{border:0;background:#6d5efc;color:#fff;border-radius:8px;padding:0 16px;cursor:pointer;font-weight:bold}
    .coupon-msg{font-size:12px;min-height:16px;margin-bottom:8px}
    .coupon-msg.ok{color:#22b07a}.coupon-msg.ng{color:#e0483a}
    .summary{border-top:2px solid #eee;margin-top:8px;padding-top:12px}
    .line{display:flex;justify-content:space-between;font-size:14px;color:#667;padding:3px 0}
    .line.discount{color:#22b07a}
    .line.total{font-size:20px;font-weight:bold;color:#222;border-top:1px dashed #ddd;margin-top:6px;padding-top:10px}
    .empty{text-align:center;color:#aab;padding:30px 0}
    .free-note{font-size:12px;color:#889}
  </style>
</head>
<body>
  <p style="color:#888;font-size:13px">数量の増減・行小計・クーポン・送料・合計。金額はすべて <code>computed</code> で自動再計算。状態は「新しい配列を代入」して更新します。</p>

  <ul id="cart"></ul>

  <div class="coupon">
    <input id="coupon" type="text" placeholder="クーポンコード（例: SAVE10）" autocomplete="off" />
    <button id="apply">適用</button>
  </div>
  <div class="coupon-msg" id="coupon-msg"></div>

  <div class="summary">
    <div class="line"><span>小計</span><span id="subtotal">¥0</span></div>
    <div class="line discount" id="discount-line" style="display:none"><span id="discount-label">割引</span><span id="discount">-¥0</span></div>
    <div class="line"><span>送料</span><span id="shipping">¥0</span></div>
    <div class="free-note" id="free-note"></div>
    <div class="line total"><span>合計</span><span id="total">¥0</span></div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
